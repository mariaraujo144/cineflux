<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineFlux — Briefing Oficial</title>
  <link rel="icon" type="image/png" href="/icon-128.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fafafa; color: #111; }
    .header { background: #fff; border-bottom: 1px solid #ebebeb; position: sticky; top: 0; z-index: 50; }
    .header-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 15px; color: #111; text-decoration: none; }
    .back-btn { width: 32px; height: 32px; border-radius: 10px; border: 1px solid #ebebeb; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; color: #111; }
    .container { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    .page-title { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .page-icon { width: 44px; height: 44px; background: #111; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .page-title h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
    .page-title p { font-size: 14px; color: #888; margin-top: 2px; }
    .field-group { background: #fff; border-radius: 20px; padding: 28px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .field-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 10px; color: #111; }
    .field-group textarea { width: 100%; min-height: 140px; padding: 14px 16px; border: 1px solid #ebebeb; border-radius: 14px; font-size: 14px; line-height: 1.7; font-family: inherit; resize: vertical; background: #fafafa; transition: all 0.15s; }
    .field-group textarea:focus { outline: none; border-color: #c4c4c4; background: #fff; }
    .field-group textarea::placeholder { color: #bbb; }
    .btn { height: 40px; padding: 0 20px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .btn-primary { background: #111; color: #fff; }
    .btn-primary:hover { background: #333; }
    .saved { font-size: 12px; color: #16a34a; background: #f0fdf4; padding: 4px 12px; border-radius: 100px; display: none; }
    .saved.show { display: inline-block; }
    .error { background: #fef2f2; color: #dc2626; padding: 12px 16px; border-radius: 14px; font-size: 14px; margin-bottom: 20px; display: none; }
    .error.show { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .footer-actions { display: flex; justify-content: flex-end; margin-top: 24px; gap: 12px; align-items: center; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/dashboard" class="back-btn">←</a>
        <a href="/" class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3" width="16" height="18" rx="1.5"/><circle cx="6.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="6.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="6.5" cy="13.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="6.5" cy="17" r="1.5" fill="currentColor" stroke="none"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="17.5" cy="10" r="1.5" fill="currentColor" stroke="none"/><circle cx="17.5" cy="13.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="17.5" cy="17" r="1.5" fill="currentColor" stroke="none"/></svg>
          CineFlux
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="saved" id="savedBadge">✓ Salvo!</span>
        <button class="btn btn-primary" onclick="saveBriefing()" id="saveBtn">Salvar Briefing</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="page-title">
      <div class="page-icon">📝</div>
      <div>
        <h1>Briefing Oficial</h1>
        <p>Preencha os 6 pilares para alinhar a equipe e os agentes de IA</p>
      </div>
    </div>

    <div class="error" id="errorMsg"></div>

    <div class="field-group">
      <label>1. Objetivo do Projeto</label>
      <textarea id="objetivo" placeholder="O que o cliente busca com este filme? Comercial institucional, promoção de produto, campanha de vendas, lançamento... Qual é a meta final?" oninput="unsaved()"></textarea>
    </div>

    <div class="field-group">
      <label>2. Narrativa — Expectativa</label>
      <textarea id="narrativa" placeholder="Qual é a história que deve ser contada? Tom dramático, cômico, emocional? Mensagem principal para o público? Expectativas do cliente sobre o impacto..." oninput="unsaved()"></textarea>
    </div>

    <div class="field-group">
      <label>3. Perfil do Elenco</label>
      <textarea id="elenco" placeholder="Atores principais, idade, perfil, etnia, especialidades. Figurantes necessários? Famosos ou elenco novo? Tom de performance: natural, dramático, cômico?" oninput="unsaved()"></textarea>
    </div>

    <div class="field-group">
      <label>4. Direção de Arte — Cores, Referências, Estilos</label>
      <textarea id="direcao_arte" placeholder="Paleta de cores, estética visual, cenários, época, vibe. Referências de filmes, séries ou campanhas. Estilo minimalista, luxo, retrô, futurista, urbano?" oninput="unsaved()"></textarea>
    </div>

    <div class="field-group">
      <label>5. Perfil das Locações</label>
      <textarea id="locacoes" placeholder="Tipo de locações: externas, internas, estúdio, chroma key, lugares específicos. Ambiente urbano, rural, praia, montanha? Permissões necessárias? Restrições de horário?" oninput="unsaved()"></textarea>
    </div>

    <div class="field-group">
      <label>6. Prazos e Informações Importantes do Projeto</label>
      <textarea id="prazos" placeholder="Data de início, data de entrega, prazos intermediários (captação, edição, finalização). Orçamento disponível. Restrições legais, LGPD. Contato principal do cliente. Qualquer informação crítica..." oninput="unsaved()"></textarea>
    </div>

    <div class="footer-actions">
      <span class="saved" id="savedBadge2"></span>
      <button class="btn btn-primary" onclick="saveBriefing()" id="saveBtn2">Salvar Briefing Completo</button>
    </div>
  </main>

  <script>
    function gid() { return new URLSearchParams(location.search).get('job') || '1'; }
    function unsaved() {
      document.getElementById('savedBadge').classList.remove('show');
      document.getElementById('savedBadge2').classList.remove('show');
      document.getElementById('savedBadge2').textContent = '';
    }

    async function loadBriefing() {
      try {
        const res = await fetch('/api/briefings/' + gid(), { credentials: 'include' });
        const data = await res.json();
        if (data.briefing) {
          ['objetivo','narrativa','elenco','direcao_arte','locacoes','prazos'].forEach(k => {
            const el = document.getElementById(k);
            if (el && data.briefing[k]) el.value = data.briefing[k];
          });
        }
      } catch (e) { console.log('Nenhum briefing salvo ainda'); }
    }

    async function saveBriefing() {
      const btns = [document.getElementById('saveBtn'), document.getElementById('saveBtn2')];
      btns.forEach(b => { b.disabled = true; b.innerHTML = '<div class="spinner"></div> Salvando...'; });

      const payload = { job_id: parseInt(gid()) };
      ['objetivo','narrativa','elenco','direcao_arte','locacoes','prazos'].forEach(k => {
        payload[k] = document.getElementById(k).value;
      });

      try {
        const res = await fetch('/api/briefings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          credentials: 'include'
        });
        if (!res.ok) throw new Error('Erro ao salvar');
        document.getElementById('savedBadge').classList.add('show');
        document.getElementById('savedBadge2').textContent = '✓ Salvo!';
        document.getElementById('errorMsg').classList.remove('show');
      } catch (e) {
        document.getElementById('errorMsg').textContent = e.message;
        document.getElementById('errorMsg').classList.add('show');
      }

      btns[0].disabled = false; btns[0].innerHTML = 'Salvar Briefing';
      btns[1].disabled = false; btns[1].innerHTML = 'Salvar Briefing Completo';
    }

    loadBriefing();
  </script>
</body>
</html>
