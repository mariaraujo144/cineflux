version: "3.8"

networks:
  cineflux-network:
    driver: bridge

services:
  # ─── Application (Node.js + Express + Static Frontend) ───
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cineflux-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - cineflux-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: cineflux-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - cineflux-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
