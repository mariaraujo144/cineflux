server {
    listen 80;
    server_name cineflux.app www.cineflux.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cineflux.app www.cineflux.app;
    
    ssl_certificate /etc/letsencrypt/live/cineflux.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cineflux.app/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    
    sendfile off;
    tcp_nopush off;
    tcp_nodelay on;
    
    root /usr/share/nginx/html;
    index index.html;

    # Arquivos estáticos específicos
    location = /google646d25bbdf9459e3.html {
        try_files $uri =404;
    }
    
    location = /privacy {
        try_files /privacy.html =404;
    }
    
    location = /terms {
        try_files /terms.html =404;
    }

    location = /privacy.html {
        try_files $uri =404;
    }
    
    location = /terms.html {
        try_files $uri =404;
    }

    # Assets com cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API - Backend Express (CRÍTICO: tem que vir ANTES do location /)
    location /api/ {
        proxy_pass http://app:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # HTML estáticos do dashboard
    location ~* \.html$ {
        try_files $uri =404;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
    }

    # React SPA - fallback para index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control 'no-cache, no-store, must-revalidate' always;
    }

    # Security headers
    add_header X-Frame-Options 'SAMEORIGIN' always;
    add_header X-Content-Type-Options 'nosniff' always;
}
